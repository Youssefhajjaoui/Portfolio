# Build and deploy the Vite app to GitHub Pages on push to main.
# Repo settings → Pages → Source: GitHub Actions.
#
# Project site: https://<user>.github.io/<repo>/
# Use a relative base (./) so JS/CSS load from /RepoName/assets/... even if repo casing differs.
# User/org site (<user>.github.io with repo <user>.github.io): set VITE_BASE to "/" instead.

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_BASE: ./
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
